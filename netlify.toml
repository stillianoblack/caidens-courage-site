[build]
  command = "yarn build"
  publish = "build"

[build.environment]
  CI = "false"

# Hashed static assets only (JS/CSS in /static/): immutable long-term caching.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML and SPA routes: never cache so users always get latest deploy.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
