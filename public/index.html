<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />
    <meta name="msapplication-TileImage" content="/logo192.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Caiden's Courage - Courage looks like doing things your own way."
      
    />
    <link rel="preconnect" href="https://caidenscourage.com" crossorigin>
    <link rel="dns-prefetch" href="//caidenscourage.com">

    <!-- LCP hero: preload only when landing on homepage so other routes don't preload unused images (avoids console warnings). -->
    <script>
      (function() {
        var p = typeof location !== 'undefined' && location.pathname;
        if (!p || p === '/' || p === '') {
          var mobile = document.createElement('link');
          mobile.rel = 'preload'; mobile.as = 'image'; mobile.href = '/images/heroes/hero-bg_mobile_800w.webp'; mobile.type = 'image/webp'; mobile.media = '(max-width: 768px)';
          var desktop = document.createElement('link');
          desktop.rel = 'preload'; desktop.as = 'image'; desktop.href = '/images/heroes/hero-bg_desktop_1600w.webp'; desktop.type = 'image/webp'; desktop.media = '(min-width: 769px)';
          document.head.appendChild(mobile); document.head.appendChild(desktop);
        }
      })();
    </script>
    <!-- Other routes: RouteHeroPreload injects preload after paint when REACT_APP_ENABLE_PRELOADS=true. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://caidenscourage.com/" />
    <meta property="og:title" content="Caiden's Courage" />
    <meta property="og:description" content="Caiden's Courage - Courage looks like doing things your own way." />
    <meta property="og:image" content="https://caidenscourage.com/images/Caiden'sCourage_SocialImage_smaller.jpg" />
    <meta property="og:image:width" content="1200" />

    <!-- Twitter -->

    <meta name="twitter:url" content="https://caidenscourage.com/" />
    <meta name="twitter:title" content="Caiden's Courage" />
    <meta name="twitter:description" content="Caiden's Courage - Courage looks like doing things your own way." />
    <meta name="twitter:image" content="https://caidenscourage.com/images/Caiden'sCourage_SocialImage_smaller.jpg" />
    
    <!--

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Caiden's Courage</title>
  </head>
  <body>
    <!-- Unregister service workers and clear caches before app runs so chunk requests on client-side nav are never intercepted by an old SW. -->
    <script>
      (function() {
        if (typeof navigator === 'undefined' || !navigator.serviceWorker) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        }).catch(function() {});
        if (typeof caches !== 'undefined' && caches.keys) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          }).catch(function() {});
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <form name="courage_toolkit" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="courage_toolkit" />
      <input name="role" />
      <input name="organization" />
      <input name="email" />
      <input name="consent" />
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <!-- Do not add a LaunchDarkly <script> tag here or via Netlify inject. LaunchDarkly loads only via the app (src/lib/launchdarkly.tsx) after first paint; no script tag to avoid NO_FCP and EventSource blocking. -->

  </body>
