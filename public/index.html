    />
    <link rel="preconnect" href="https://caidenscourage.com" crossorigin>
    <link rel="dns-prefetch" href="//caidenscourage.com">

    <!-- LCP hero: preload only when landing on homepage so other routes don't preload unused images (avoids console warnings). -->
    <script>
      (function() {
        var p = typeof location !== 'undefined' && location.pathname;
        if (!p || p === '/' || p === '') {
          var mobile = document.createElement('link');
          mobile.rel = 'preload'; mobile.as = 'image'; mobile.href = "/images/hero/hero-mobile.webp"; mobile.type = 'image/webp'; mobile.media = '(max-width: 768px)';
          var desktop = document.createElement('link');
          desktop.rel = 'preload'; desktop.as = 'image'; desktop.href = "/images/hero/hero-desktop.webp"; desktop.type = 'image/webp'; desktop.media = '(min-width: 769px)';
          document.head.appendChild(mobile); document.head.appendChild(desktop);
        }
      })();
    </script>
    <!-- Other routes: RouteHeroPreload injects preload after paint when REACT_APP_ENABLE_PRELOADS=true. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking fonts: reduced weights (dropped 900) for faster load -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>

  <body>
    <!-- Defer SW/cache cleanup until after first paint to avoid blocking -->
    <script>
      (function() {
        if (typeof navigator === 'undefined' || !navigator.serviceWorker) return;
        var run = function() {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          }).catch(function() {});
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            }).catch(function() {});
          }
        };
        if (window.requestIdleCallback) {
          requestIdleCallback(run, { timeout: 2000 });
        } else {
          setTimeout(run, 500);
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <form name="courage_toolkit" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="courage_toolkit" />
      <input name="role" />
      <input name="organization" />
      <input name="email" />
      <input name="consent" />
      <input name="bot-field" />
    </form>
    <div id="root"></div>
