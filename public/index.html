<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />
    <meta name="msapplication-TileImage" content="/logo192.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Caiden's Courage - Courage looks like doing things your own way."
      
    />
    <link rel="preconnect" href="https://caidenscourage.com" crossorigin>
    <link rel="dns-prefetch" href="//caidenscourage.com">

    <!-- LCP hero: preload in initial document so the request is discoverable before JS (homepage above-the-fold only). -->
    <link rel="preload" href="/images/heroes/hero-bg_mobile_800w.webp" as="image" type="image/webp" media="(max-width: 768px)" />
    <link rel="preload" href="/images/heroes/hero-bg_desktop_1600w.webp" as="image" type="image/webp" media="(min-width: 769px)" />
    <!-- Other routes: RouteHeroPreload injects preload after paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <!-- Fonts loaded by script after first paint (index.js); noscript fallback below. -->
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://caidenscourage.com/" />
    <meta property="og:title" content="Caiden's Courage" />
    <meta property="og:description" content="Caiden's Courage - Courage looks like doing things your own way." />
    <meta property="og:image" content="https://caidenscourage.com/images/Caiden'sCourage_SocialImage_smaller.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://caidenscourage.com/" />
    <meta name="twitter:title" content="Caiden's Courage" />
    <meta name="twitter:description" content="Caiden's Courage - Courage looks like doing things your own way." />
    <meta name="twitter:image" content="https://caidenscourage.com/images/Caiden'sCourage_SocialImage_smaller.jpg" />
    
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Caiden's Courage</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Do not add a LaunchDarkly <script> tag here or via Netlify inject. LaunchDarkly loads only via the app (src/lib/launchdarkly.tsx) after first paint; no script tag to avoid NO_FCP and EventSource blocking. -->
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
