<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netlify Forms Stub</title>
</head>
<body>
  <!-- Build-time stubs for Netlify Forms detection (SPA) -->
  <form name="courage_toolkit" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="courage_toolkit" />
    <input name="bot-field" />
    <input type="text" name="role" />
    <input type="text" name="organization" />
    <input type="email" name="email" />
    <input type="text" name="consent" />
  </form>
  <form name="resource_notify" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="resource_notify" />
    <input name="bot-field" />
    <input type="email" name="email" />
  </form>
</body>
</html>
