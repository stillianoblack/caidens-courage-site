<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're subscribed — Caiden's Courage</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-500: #243E70;
      --navy-700: #1F3C63;
      --golden-500: #F4D477;
      --cream: #faf9f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      background: white;
      border-radius: 1rem;
      border: 1px solid #E7EEF7;
      box-shadow: 0 12px 35px rgba(31, 60, 99, 0.12);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background: var(--golden-500);
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 10px 22px rgba(244, 212, 119, 0.55);
    }
    h1 {
      font-family: 'Nunito', system-ui, sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--navy-700);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #4E6A86;
      margin-top: 0.75rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.75rem;
      padding: 0.875rem 1.75rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--navy-700);
      background: var(--golden-500);
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(244, 212, 119, 0.55);
      transition: filter 0.2s;
    }
    .btn:hover {
      filter: brightness(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge" aria-hidden="true">✓</div>
    <h1>You're subscribed.</h1>
    <p>We'll notify you when new free resources are added to the B-4 Tools Library.</p>
    <a href="/resources" class="btn">Back to Resources</a>
  </div>
</body>
</html>
